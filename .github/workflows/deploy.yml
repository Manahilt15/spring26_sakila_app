name: Deploy Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'app.py'
      - 'config.py'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'docker-compose.yml'
      - 'templates/**'
      - 'static/**'
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.gitignore'
      - '*.md'

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy to Staging
        run: |
          echo "Deploying to staging environment..."
          echo "### Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "* Status: Deployed to Staging Successfully" >> $GITHUB_STEP_SUMMARY

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Generate Date-Based Tag
        id: date_tag
        run: echo "tag=v$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.date_tag.outputs.tag }}
          release_name: Release ${{ steps.date_tag.outputs.tag }}
          body: "Automated production release."
